services:
  db:
    container_name: spaik-postgres
    image: postgres:15.2
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "5433:5432"
    volumes:
      - spaik_postgres_data:/var/lib/postgresql/data
    networks:
      - spaik-backend

  redis:
    container_name: spaik-redis
    image: redis:5.0
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - spaik_redis_data:/data
    networks:
      - spaik-backend

  minio:
    container_name: spaik-minio
    image: quay.io/minio/minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: spaik_admin
      MINIO_ROOT_PASSWORD: spaik_password_123
    command: server /data --console-address ":9001"
    volumes:
      - spaik_minio_data:/data
    networks:
      - spaik-backend

  livekit:
    container_name: spaik-livekit
    image: livekit/livekit-server:latest
    restart: always
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-50200:50000-50200/udp"
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    networks:
      - spaik-backend

  livekit-ingress:
    container_name: spaik-livekit-ingress
    image: livekit/ingress:latest
    restart: always
    environment:
      INGRESS_CONFIG_FILE: /etc/ingress.yaml
    ports:
      - "1935:1935"   # RTMP (OBS)
      - "8080:8080"   # WHIP (OBS 30+ / browsers)
    volumes:
      - ./ingress.yaml:/etc/ingress.yaml
    depends_on:
      - livekit
      - redis
    networks:
      - spaik-backend

volumes:
  spaik_postgres_data:
  spaik_redis_data:
  spaik_minio_data:

networks:
  spaik-backend:
    driver: bridge
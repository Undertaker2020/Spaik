port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50100
  tcp_port: 7881
  use_external_ip: false
  # Advertise the host's LAN IP in ICE candidates so phones on the same Wi-Fi
  # can reach the media ports (without this, the container advertises its
  # unreachable internal bridge IP). Must match mobile/app.json livekitWsUrl.
  node_ip: 192.168.50.253

keys:
  spaik_dev_key: spaik_dev_secret_min_32_chars_long

redis:
  address: redis:6379
  password: redis_pass

# LiveKit posts events (ingress_started/ended) to the monolith webhook so it can
# flip stream.isLive + send notifications. The monolith runs on the host, reached
# from the container via host.docker.internal.
webhook:
  api_key: spaik_dev_key
  urls:
    - http://host.docker.internal:4000/webhook/livekit

ingress:
  # URLs returned to clients (OBS). Use localhost for OBS on this machine; for OBS
  # on another device, replace localhost with this machine's LAN IP.
  rtmp_base_url: rtmp://localhost:1935/x
  whip_base_url: http://localhost:8080/w

logging:
  level: info